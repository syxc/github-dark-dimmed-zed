# Workflow triggered on release tags
# For manual submission to zed-industries/extensions

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release Created
    runs-on: ubuntu-latest
    steps:
      - name: Print info
        run: |
          echo "✓ Release ${{ github.ref_name }} published"
          echo "✓ Submit to: https://github.com/zed-industries/extensions"
